app-id: net.sourceforge.xmlcopyeditor
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: xmlcopyeditor-wrapper.sh

finish-args:
  - --socket=x11
  - --share=ipc
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --filesystem=xdg-documents
  - --socket=session-bus

modules:
  # Hicolor icon theme - Base icon theme required by Adwaita
  - name: hicolor-icon-theme
    buildsystem: meson
    sources:
      - type: archive
        url: https://icon-theme.freedesktop.org/releases/hicolor-icon-theme-0.18.tar.xz
        sha256: db0e50a80aa3bf64bb45cbca5cf9f75efd9348cf2ac690b907435238c3cf81d7

  # Adwaita icon theme - Provides standard GTK icons for wxArtProvider
  - name: adwaita-icon-theme
    buildsystem: meson
    sources:
      - type: archive
        url: https://download.gnome.org/sources/adwaita-icon-theme/46/adwaita-icon-theme-46.2.tar.xz
        sha256: beb126b9429339ba762e0818d5e73b2c46f444975bf80076366eae2d0f96b5cb
    post-install:
      - gtk-update-icon-cache -q -t -f /app/share/icons/Adwaita || true
      - gtk-update-icon-cache -q -t -f /app/share/icons/hicolor || true

  # wxWidgets 3.0 - Required by XML Copy Editor
  - name: wxwidgets
    buildsystem: autotools
    config-opts:
      - --with-gtk=3
      - --enable-unicode
      - --enable-std_string
      - --enable-display
      - --enable-protocols
      - --enable-url
      - --with-expat=sys
      - --with-libjpeg
      - --with-libpng
      - --with-zlib
      - --disable-webkit
      - --disable-webviewwebkit
    sources:
      - type: archive
        url: https://github.com/wxWidgets/wxWidgets/releases/download/v3.0.5.1/wxWidgets-3.0.5.1.tar.bz2
        sha256: 440f6e73cf5afb2cbf9af10cec8da6cdd3d3998d527598a53db87099524ac807

  # Boost (headers only needed for shared_ptr)
  - name: boost
    buildsystem: simple
    build-commands:
      - mkdir -p /app/include
      - cp -r boost /app/include/
    sources:
      - type: archive
        url: https://sourceforge.net/projects/boost/files/boost/1.83.0/boost_1_83_0.tar.bz2/download
        sha256: 6478edfe2f3305127cffe8caf73ea0176c53769f4bf1585be237eb30798c3b8e
        dest-filename: boost_1_83_0.tar.bz2

  # Xerces-C++ - XML parser
  - name: xerces-c
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://archive.apache.org/dist/xerces/c/3/sources/xerces-c-3.2.5.tar.gz
        sha256: 545cfcce6c4e755207bd1f27e319241e50e37c0c27250f11cda116018f1ef0f5

  # intltool - Internationalization tool
  - name: intltool
    buildsystem: autotools
    sources:
      - type: archive
        url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
        sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd

  # XML Copy Editor
  - name: xmlcopyeditor
    buildsystem: simple
    sources:
      - type: archive
        url: https://sourceforge.net/projects/xml-copy-editor/files/xmlcopyeditor-linux/1.3.1.0/xmlcopyeditor-1.3.1.0.tar.gz/download
        sha256: e871ca97b86acaf177809f6f9a32e34d3e3da6b27c2a1104574a8fb097d07c91
        dest-filename: xmlcopyeditor-1.3.1.0.tar.gz
      
      - type: patch
        path: fix-const-xmlerror.patch
      
      - type: file
        path: net.sourceforge.xmlcopyeditor.desktop
      
      - type: file
        path: net.sourceforge.xmlcopyeditor.metainfo.xml
      
      - type: file
        path: xmlcopyeditor-wrapper.sh
    
    build-commands:
      # Fix wxStandardPaths: Add SetAppName so it finds /app/share/xmlcopyeditor
      - sed -i '/#endif$/a\\t// Set application name for wxStandardPaths\n\tSetAppName ( _T ( "xmlcopyeditor" ) );\n' src/xmlcopyeditor.cpp
      - ./configure --prefix=/app
      - make -j${FLATPAK_BUILDER_N_JOBS}
      # Manually install the binary and required files (skip broken make install)
      - install -Dm755 src/xmlcopyeditor /app/bin/xmlcopyeditor
      - install -Dm755 xmlcopyeditor-wrapper.sh /app/bin/xmlcopyeditor-wrapper.sh
      - mkdir -p /app/share/xmlcopyeditor
      # Copy all data directories from src/
      - cp -r src/catalog /app/share/xmlcopyeditor/
      - cp -r src/copying /app/share/xmlcopyeditor/
      - cp -r src/dtd /app/share/xmlcopyeditor/
      - cp -r src/rng /app/share/xmlcopyeditor/
      - cp -r src/templates /app/share/xmlcopyeditor/
      - cp -r src/xsl /app/share/xmlcopyeditor/
      - cp -r src/png /app/share/xmlcopyeditor/
      - cp -r src/help /app/share/xmlcopyeditor/
      # Create rulesets directory (expected by the app)
      - mkdir -p /app/share/xmlcopyeditor/rulesets
      # Install locales
      - for po in po/*.po; do lang=$(basename $po .po); mkdir -p /app/share/locale/$lang/LC_MESSAGES; msgfmt $po -o /app/share/locale/$lang/LC_MESSAGES/xmlcopyeditor.mo; done || true
      # Install desktop file with correct name
      - install -Dm644 net.sourceforge.xmlcopyeditor.desktop /app/share/applications/net.sourceforge.xmlcopyeditor.desktop
      # Install icons from mac directory (PNG format)
      - install -Dm644 mac/xmlcopyeditor.iconset/icon_128x128.png /app/share/icons/hicolor/128x128/apps/net.sourceforge.xmlcopyeditor.png
      - install -Dm644 mac/xmlcopyeditor.iconset/icon_256x256.png /app/share/icons/hicolor/256x256/apps/net.sourceforge.xmlcopyeditor.png
      - install -Dm644 mac/xmlcopyeditor.iconset/icon_512x512.png /app/share/icons/hicolor/512x512/apps/net.sourceforge.xmlcopyeditor.png
      # Install AppStream metadata
      - install -Dm644 net.sourceforge.xmlcopyeditor.metainfo.xml /app/share/metainfo/net.sourceforge.xmlcopyeditor.metainfo.xml
