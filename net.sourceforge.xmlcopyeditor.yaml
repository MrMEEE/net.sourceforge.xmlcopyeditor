app-id: net.sourceforge.xmlcopyeditor
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: xmlcopyeditor

finish-args:
  - --socket=x11
  - --share=ipc
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --filesystem=xdg-documents
  - --socket=session-bus

modules:
  # wxWidgets 3.0 - Required by XML Copy Editor
  - name: wxwidgets
    buildsystem: autotools
    config-opts:
      - --with-gtk=3
      - --enable-unicode
      - --enable-std_string
      - --enable-display
      - --enable-protocols
      - --enable-url
      - --with-expat=sys
      - --with-libjpeg
      - --with-libpng
      - --with-zlib
      - --disable-webkit
      - --disable-webviewwebkit
    sources:
      - type: archive
        url: https://github.com/wxWidgets/wxWidgets/releases/download/v3.0.5.1/wxWidgets-3.0.5.1.tar.bz2
        sha256: 440f6e73cf5afb2cbf9af10cec8da6cdd3d3998d527598a53db87099524ac807

  # Boost (headers only needed for shared_ptr)
  - name: boost
    buildsystem: simple
    build-commands:
      - mkdir -p /app/include
      - cp -r boost /app/include/
    sources:
      - type: archive
        url: https://sourceforge.net/projects/boost/files/boost/1.83.0/boost_1_83_0.tar.bz2/download
        sha256: 6478edfe2f3305127cffe8caf73ea0176c53769f4bf1585be237eb30798c3b8e
        dest-filename: boost_1_83_0.tar.bz2

  # Xerces-C++ - XML parser
  - name: xerces-c
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://archive.apache.org/dist/xerces/c/3/sources/xerces-c-3.2.5.tar.gz
        sha256: 545cfcce6c4e755207bd1f27e319241e50e37c0c27250f11cda116018f1ef0f5

  # intltool - Internationalization tool
  - name: intltool
    buildsystem: autotools
    sources:
      - type: archive
        url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
        sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd

  # XML Copy Editor
  - name: xmlcopyeditor
    buildsystem: autotools
    sources:
      - type: archive
        url: https://sourceforge.net/projects/xml-copy-editor/files/xmlcopyeditor-linux/1.3.1.0/xmlcopyeditor-1.3.1.0.tar.gz/download
        sha256: e871ca97b86acaf177809f6f9a32e34d3e3da6b27c2a1104574a8fb097d07c91
        dest-filename: xmlcopyeditor-1.3.1.0.tar.gz
      
      - type: file
        path: net.sourceforge.xmlcopyeditor.desktop
      
      - type: file
        path: net.sourceforge.xmlcopyeditor.metainfo.xml
    
    build-commands:
      - ./configure --prefix=/app
      - make -j${FLATPAK_BUILDER_N_JOBS}
      - make install
      # Install desktop file with correct name
      - install -Dm644 net.sourceforge.xmlcopyeditor.desktop /app/share/applications/net.sourceforge.xmlcopyeditor.desktop
      # Install icons from mac directory (PNG format)
      - install -Dm644 mac/xmlcopyeditor.iconset/icon_128x128.png /app/share/icons/hicolor/128x128/apps/net.sourceforge.xmlcopyeditor.png
      - install -Dm644 mac/xmlcopyeditor.iconset/icon_256x256.png /app/share/icons/hicolor/256x256/apps/net.sourceforge.xmlcopyeditor.png
      - install -Dm644 mac/xmlcopyeditor.iconset/icon_512x512.png /app/share/icons/hicolor/512x512/apps/net.sourceforge.xmlcopyeditor.png
      # Install AppStream metadata
      - install -Dm644 net.sourceforge.xmlcopyeditor.metainfo.xml /app/share/metainfo/net.sourceforge.xmlcopyeditor.metainfo.xml
